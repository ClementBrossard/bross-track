name: Parse Course

on:
  workflow_dispatch:
    inputs:
      date_pmu:
        description: "Date PMU (DDMMYYYY)"
        required: true
      date_galop:
        description: "Date Galop (YYYYMMDD)"
        required: true
      code_hippo:
        description: "Code hippodrome (ex: CHA)"
        required: true
      num_reunion:
        description: "Numéro de réunion"
        required: true
      num_course:
        description: "Numéro de course"
        required: true

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pdfplumber requests

      - name: Parse course
        env:
          DATE_PMU:    ${{ inputs.date_pmu }}
          DATE_GALOP:  ${{ inputs.date_galop }}
          CODE_HIPPO:  ${{ inputs.code_hippo }}
          NUM_REUNION: ${{ inputs.num_reunion }}
          NUM_COURSE:  ${{ inputs.num_course }}
          OUTPUT_FILE: output.json
        run: python scripts/parse_course.py

      - name: Save to data branch
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('output.json').toString('base64');
            const path = `data/${{ inputs.date_galop }}/${{ inputs.code_hippo }}_C${{ inputs.num_course.padStart(2, '0') }}.json`;

            let sha;
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                path,
                ref:   'data',
              });
              sha = data.sha;
            } catch (_) {}

            await github.rest.repos.createOrUpdateFileContents({
              owner:   context.repo.owner,
              repo:    context.repo.repo,
              path,
              message: `cache: ${{ inputs.code_hippo }} C${{ inputs.num_course }} ${{ inputs.date_galop }}`,
              content,
              branch:  'data',
              ...(sha && { sha }),
            });

            console.log(`Saved to data branch: ${path}`);
